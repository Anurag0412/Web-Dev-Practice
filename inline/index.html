<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Media Player</title>
</head>
<body>
    <header>
        <h1>The Media Player</h1>
    </header>
    <main>
        <h2>
            Media Files
        </h2>
        <h3>Videos</h3>
        <video src="1.mp4" controls muted>Video 1</video>
        <video src="2.mp4" controls muted>Video 2</video>
        <video src="3.mp4" controls muted>Video 3</video>
        <video src="4.mp4" controls muted>Video 4</video>
        <video src="5.mp4" controls muted>Video 5</video>
        <video src="6.mp4" controls muted>Video 6</video>
        <h3>Audio</h3>
        
        <audio src="1.mp3" controls>Audio 1</audio>        
        <audio src="2.mp3" controls>Audio 2</audio>
        <audio src="3.mp3" controls>Audio 3</audio>
        <audio src="4.mp3" controls>Audio 4</audio>
        <audio src="5.mp3" controls>Audio 5</audio>  
        <audio src="6.mp3" controls>Audio 6</audio>      
    </main>

    <footer>
        <p>| &copy; 2026 The Media Player | All rights reserved.|</p>
    </footer>
</body>
</html>
